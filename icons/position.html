<!DOCTYPE html>
<html>
  <head>
    <title>css position</title>
  </head>

  <body style="
  height:3000px;
  padding-top:60px;
  padding-left:80px;
  ">


    <div style="
    background-color:black;
    color:white;
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:50px;
    z-index:1;
      ">header 
      </div>

      
      <div style="
  background-color:green;
  position:fixed;
  color:white;
  top:50px;
  bottom:0;
  left:0px;
  width:72px;
      ">
      sidebar

          <div style="
      position:absolute;
      background-color:red;
      top:0px;
      right:0px;
      z-index:2;
      ">
       X
      </div>
      </div>



    <div style="
      height:200px;
      width:200px;
      background-color:lightblue;
      position:relative;

      ">
      div1

        <div style="
      position:absolute;
      background-color:white;
      bottom:10px;
      right:10px;
      z-index:2;
      ">
        absloute
      </div>

    </div>

    
    <div style="
    height:200px;
    width:200px;
    background-color:lightpink;
    ">
      div2
    </div>

  </body>
</html>
